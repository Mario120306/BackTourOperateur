<style>
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 260px;
        height: 100vh;
        background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
        padding: 20px 0;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        z-index: 1000;
    }

    .sidebar-header {
        padding: 0 20px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 20px;
    }

    .sidebar-header h2 {
        color: #fff;
        font-size: 1.4em;
        margin-bottom: 5px;
    }

    .sidebar-header p {
        color: #bdc3c7;
        font-size: 0.85em;
    }

    .sidebar-menu {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .sidebar-menu li {
        margin-bottom: 5px;
    }

    .sidebar-menu a {
        display: flex;
        align-items: center;
        padding: 12px 20px;
        color: #ecf0f1;
        text-decoration: none;
        transition: all 0.3s ease;
        font-size: 0.95em;
        border-left: 3px solid transparent;
    }

    .sidebar-menu a:hover {
        background-color: rgba(255, 255, 255, 0.1);
        border-left-color: #3498db;
        padding-left: 25px;
    }

    .sidebar-menu a.active {
        background-color: rgba(52, 152, 219, 0.2);
        border-left-color: #3498db;
        font-weight: 600;
    }

    .sidebar-menu a i {
        margin-right: 12px;
        font-size: 1.1em;
        width: 20px;
        text-align: center;
    }

    .menu-section {
        padding: 15px 20px 5px;
        color: #95a5a6;
        font-size: 0.75em;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
    }

    /* Adaptation pour les contenus avec sidebar */
    .content-with-sidebar {
        margin-left: 260px;
        min-height: 100vh;
        padding: 20px;
    }

    @media (max-width: 768px) {
        .sidebar {
            width: 0;
            overflow: hidden;
        }

        .sidebar.mobile-open {
            width: 260px;
        }

        .content-with-sidebar {
            margin-left: 0;
        }

        .mobile-toggle {
            display: block;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1001;
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    }

    .mobile-toggle {
        display: none;
    }
</style>

<button class="mobile-toggle" onclick="toggleSidebar()">☰ Menu</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>🚐 Tour Operator</h2>
        <p>Gestion & Simulation</p>
    </div>

    <div class="menu-section">Réservations</div>
    <ul class="sidebar-menu">
        <li>
            <a href="${pageContext.request.contextPath}/reservation/form">
                <i>➕</i> Nouvelle réservation
            </a>
        </li>
        <li>
            <a href="${pageContext.request.contextPath}/reservation/par-date/form">
                <i>📅</i> Simulation par date
            </a>
        </li>
    </ul>

    <div class="menu-section">Véhicules</div>
    <ul class="sidebar-menu">
        <li>
            <a href="${pageContext.request.contextPath}/vehicule/form">
                <i>🚗</i> Nouveau véhicule
            </a>
        </li>
        <li>
            <a href="${pageContext.request.contextPath}/vehicule/list">
                <i>🚙</i> Liste des véhicules
            </a>
        </li>
    </ul>

    <div class="menu-section">Paramètres</div>
    <ul class="sidebar-menu">
        <li>
            <a href="${pageContext.request.contextPath}/parametre/form">
                <i>⚙️</i> Configuration
            </a>
        </li>
    </ul>

    <div class="menu-section">Simulation</div>
    <ul class="sidebar-menu">
        <li>
            <a href="${pageContext.request.contextPath}/simulation/assignement">
                <i>🎯</i> Simulation d'assignement
            </a>
        </li>
    </ul>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('mobile-open');
    }

    // Fermer la sidebar sur mobile quand on clique sur un lien
    document.querySelectorAll('.sidebar-menu a').forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('mobile-open');
            }
        });
    });

    // Marquer l'élément actif
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        document.querySelectorAll('.sidebar-menu a').forEach(link => {
            if (link.getAttribute('href') && currentPath.includes(link.getAttribute('href'))) {
                link.classList.add('active');
            }
        });
    });
</script>
